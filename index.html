<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>How Well Do You Know Me?</title>
<meta name="description" content="Take my 20-question friendship quiz and see how well you know me!">
<style>
:root {
  --bg1:#1c062e; --bg2:#5f1d85; --card:#fff; --purple:#7c3aed;
  --purple2:#a855f7; --text:#24122f; --muted:#6d5a76;
  --good:#168a46; --bad:#d04452;
}
*{box-sizing:border-box}
body{
  margin:0; min-height:100vh; font-family:Arial,Helvetica,sans-serif;
  background:
    radial-gradient(circle at 15% 10%,rgba(255,255,255,.12),transparent 25%),
    radial-gradient(circle at 85% 80%,rgba(255,255,255,.08),transparent 30%),
    linear-gradient(135deg,var(--bg1),var(--bg2));
  color:var(--text); padding:16px; overflow-x:hidden;
}
.shell{width:min(760px,100%);margin:0 auto}
.card{
  background:rgba(255,255,255,.98); border-radius:26px; padding:24px;
  box-shadow:0 22px 65px rgba(0,0,0,.3);
  animation:cardIn .45s ease both;
}
@keyframes cardIn{from{opacity:0;transform:translateY(18px) scale(.98)}to{opacity:1;transform:none}}
@keyframes slideIn{from{opacity:0;transform:translateX(28px)}to{opacity:1;transform:none}}
@keyframes pop{0%{transform:scale(.85)}70%{transform:scale(1.06)}100%{transform:scale(1)}}
.hidden{display:none!important}
.hero{text-align:center;padding:42px 24px}
.hero h1{font-size:clamp(2rem,8vw,3.7rem);color:#5b21b6;margin:0 0 12px}
.hero p{color:var(--muted);line-height:1.6;margin:0}
.input{
  width:100%;padding:14px 16px;border:2px solid #ddc9ed;border-radius:14px;
  font-size:1rem;outline:none;margin-top:16px
}
.input:focus{border-color:var(--purple)}
button{
  border:0;border-radius:15px;padding:14px 18px;font-size:1rem;font-weight:800;
  cursor:pointer;transition:.18s ease
}
.primary{width:100%;background:linear-gradient(90deg,var(--purple),var(--purple2));color:white;margin-top:14px}
.primary:hover{transform:translateY(-1px)}
.secondary{width:100%;background:#efe4f8;color:#5b21b6;margin-top:10px}
.topbar{display:flex;justify-content:space-between;gap:12px;color:var(--muted);font-weight:800}
.progress{height:11px;background:#eadff1;border-radius:99px;overflow:hidden;margin:16px 0 24px}
.progress span{display:block;height:100%;width:0;background:linear-gradient(90deg,#8b5cf6,#c084fc);transition:width .45s ease}
.questionStage{animation:slideIn .36s ease both}
.question{font-size:1.45rem;line-height:1.35;margin:0 0 18px}
.answers{display:grid;gap:12px}
.answer{
  text-align:left;background:#f4eef8;color:var(--text);border:2px solid transparent
}
.answer:hover{border-color:#c7a9dd;transform:translateY(-1px)}
.answer.correct{background:#e2f7e9;border-color:var(--good);color:#0c6a31}
.answer.wrong{background:#fde7e9;border-color:var(--bad);color:#8d2733}
.answer:disabled{cursor:default;transform:none}
.feedback{min-height:26px;margin-top:16px;font-weight:900}
.result{text-align:center}
.scoreRing{
  width:180px;height:180px;border-radius:50%;margin:20px auto;display:grid;place-items:center;
  background:conic-gradient(var(--purple) 0deg,#ece5f2 0deg);position:relative
}
.scoreRing::before{content:"";position:absolute;inset:14px;background:white;border-radius:50%}
.scoreText{position:relative;font-size:3rem;font-weight:900;color:#5b21b6}
.endingCard{border-radius:18px;padding:18px;margin:16px 0;font-size:1.15rem;font-weight:800;animation:pop .45s ease both}
.gold{background:#fff4cc;color:#725400}
.purple{background:#efe2ff;color:#5b21b6}
.blue{background:#e2f0ff;color:#245b95}
.pink{background:#ffe4ef;color:#982c58}
.gray{background:#f0f0f0;color:#555}
.sectionTitle{text-align:left;margin:26px 0 10px}
.review,.leaderboard{display:grid;gap:10px;text-align:left}
.item{background:#f5eef9;border-radius:14px;padding:13px}
.small{font-size:.92rem;color:var(--muted);margin-top:4px}
.confetti{position:fixed;top:-24px;z-index:9999;pointer-events:none;animation:fall 3.2s linear forwards}
@keyframes fall{to{transform:translateY(112vh) rotate(720deg);opacity:.9}}
@media(max-width:520px){
  .card{padding:18px;border-radius:20px}
  .question{font-size:1.25rem}
  .scoreRing{width:150px;height:150px}
  .scoreText{font-size:2.5rem}
}
</style>
</head>
<body>
<main class="shell">
<section id="start" class="card hero">
  <h1>💜 How Well Do You Know Me? 💜</h1>
  <p>20 questions. Some are easy, some are sneaky, and some are only for my closest friends 😭</p>
  <input id="nameInput" class="input" maxlength="24" placeholder="Enter your name ✨">
  <button id="startBtn" class="primary">Start the quiz</button>
</section>

<section id="quiz" class="card hidden">
  <div class="topbar"><span id="count">Question 1 of 20</span><span id="live">Score: 0</span></div>
  <div class="progress"><span id="bar"></span></div>
  <div id="stage" class="questionStage">
    <h2 id="question" class="question"></h2>
    <div id="answers" class="answers"></div>
    <div id="feedback" class="feedback"></div>
    <button id="nextBtn" class="primary hidden">Next question</button>
  </div>
</section>

<section id="result" class="card result hidden">
  <h2>Your final score</h2>
  <div id="scoreRing" class="scoreRing"><div id="scoreText" class="scoreText">0/20</div></div>
  <div id="endingCard" class="endingCard"></div>
  <button id="shareBtn" class="primary">Share my score</button>
  <button id="restartBtn" class="secondary">Try again</button>

  <h3 class="sectionTitle">🏆 Leaderboard on this browser</h3>
  <div id="leaderboard" class="leaderboard"></div>

  <h3 class="sectionTitle">📋 Answer review</h3>
  <div id="review" class="review"></div>
</section>
</main>

<script>
const quizData = [{"q": "What's my favourite colour?", "options": ["Blue", "Purple", "Pink", "Red"], "answer": "Purple"}, {"q": "What's my favourite food?", "options": ["Burger", "Pasta", "Pizza", "Sushi"], "answer": "Pizza"}, {"q": "What's my favourite season?", "options": ["Winter", "Summer", "Autumn", "Spring"], "answer": "Summer"}, {"q": "Which animal would I choose as a pet?", "options": ["Cat", "Rabbit", "Dog", "Parrot"], "answer": "Dog"}, {"q": "What's my biggest ick?", "options": ["Bad hygiene", "Dry texters", "People who are always late", "Loud chewing"], "answer": "Dry texters"}, {"q": "What's the quickest way to make me lose interest?", "options": ["Being bad at texting", "Showing off all the time", "Interrupting me when I speak", "Being overly clingy"], "answer": "Interrupting me when I speak"}, {"q": "What's my love language?", "options": ["Acts of service", "Skinship / physical touch", "Quality time", "Receiving gifts"], "answer": "Skinship / physical touch"}, {"q": "What's my favourite music genre?", "options": ["T-Pop", "K-Pop", "Any genre", "R&B"], "answer": "Any genre"}, {"q": "What's my favourite social media app?", "options": ["Instagram", "TikTok", "Discord", "YouTube"], "answer": "TikTok"}, {"q": "What's my favourite thing to do in my free time?", "options": ["Play video games", "Read books", "Watch BLs", "Listen to music"], "answer": "Watch BLs"}, {"q": "What's something I'm surprisingly good at?", "options": ["Singing", "Being flexible", "Drawing", "Cooking"], "answer": "Being flexible"}, {"q": "What's my favourite colour to wear?", "options": ["White", "Navy blue", "Black", "Grey"], "answer": "Black"}, {"q": "What's my secondary gender?", "options": ["Omega", "Alpha", "Enigma", "Beta"], "answer": "Alpha"}, {"q": "What's my dream country to visit?", "options": ["South Korea", "Japan", "Thailand", "Switzerland"], "answer": "Thailand"}, {"q": "What kind of place would I most want to live in?", "options": ["A beach house", "An estate", "A busy city centre", "A cabin in the mountains"], "answer": "An estate"}, {"q": "If I could own any animal, which would I choose?", "options": ["Fox", "Monkey", "Otter", "Wolf"], "answer": "Monkey"}, {"q": "Who's my favourite music artist?", "options": ["BTS", "TXT", "Stray Kids", "Enhypen"], "answer": "Stray Kids"}, {"q": "What's my favourite BL series of all time?", "options": ["Duang With You", "Jack & Joker", "The Eclipse", "Not Me"], "answer": "Not Me"}, {"q": "Who's my favourite BL actor?", "options": ["Pond", "Fourth", "Phuwin", "Gemini"], "answer": "Phuwin"}, {"q": "What's my favourite movie?", "options": ["Annabelle", "Scream", "Fear Street", "The Texas Chainsaw Massacre"], "answer": "Fear Street"}];
let index=0, score=0, picked=[], player="Bestie";
const $=id=>document.getElementById(id);

$("startBtn").onclick=()=>{
  player=$("nameInput").value.trim()||"Bestie";
  $("start").classList.add("hidden");
  $("quiz").classList.remove("hidden");
  render();
};

function animateStage(){
  const s=$("stage");
  s.classList.remove("questionStage");
  void s.offsetWidth;
  s.classList.add("questionStage");
}

function render(){
  animateStage();
  const item=quizData[index];
  $("count").textContent=`Question ${index+1} of ${quizData.length}`;
  $("live").textContent=`Score: ${score}`;
  $("bar").style.width=`${(index/quizData.length)*100}%`;
  $("question").textContent=item.q;
  $("answers").innerHTML="";
  $("feedback").textContent="";
  $("nextBtn").classList.add("hidden");
  $("nextBtn").textContent=index===quizData.length-1?"See my score":"Next question";

  item.options.forEach(opt=>{
    const b=document.createElement("button");
    b.className="answer";
    b.textContent=opt;
    b.onclick=()=>choose(b,opt);
    $("answers").appendChild(b);
  });
}

function choose(button,opt){
  const item=quizData[index];
  const buttons=[...document.querySelectorAll(".answer")];
  buttons.forEach(b=>b.disabled=true);
  const correct=opt===item.answer;

  if(correct){
    score++;
    button.classList.add("correct");
    $("feedback").textContent="Correct 😌";
    $("feedback").style.color="var(--good)";
  } else {
    button.classList.add("wrong");
    buttons.find(b=>b.textContent===item.answer)?.classList.add("correct");
    $("feedback").textContent=`Wrong 😭 The answer was: ${item.answer}`;
    $("feedback").style.color="var(--bad)";
  }

  picked.push({question:item.q,chosen:opt,correct:item.answer,isCorrect:correct});
  $("live").textContent=`Score: ${score}`;
  $("bar").style.width=`${((index+1)/quizData.length)*100}%`;
  $("nextBtn").classList.remove("hidden");
}

$("nextBtn").onclick=()=>{
  index++;
  if(index<quizData.length) render();
  else showResults();
};

function ending(score){
  if(score===20) return {cls:"gold",text:`${player}, soulmate status 😭💜 You know me TOO well.`};
  if(score>=16) return {cls:"purple",text:`${player}, certified close friend 💅 You definitely know your stuff.`};
  if(score>=11) return {cls:"blue",text:`${player}, not bad at all 👀 You know me, but I can still surprise you.`};
  if(score>=6) return {cls:"pink",text:`${player}, hmm… acquaintance energy 😭 We need to talk more.`};
  return {cls:"gray",text:`${player}, do we even know each other? 💀`};
}

function animateScore(){
  let shown=0;
  const target=score;
  const ring=$("scoreRing");
  const timer=setInterval(()=>{
    shown++;
    if(shown>target) shown=target;
    $("scoreText").textContent=`${shown}/20`;
    ring.style.background=`conic-gradient(var(--purple) ${shown/20*360}deg,#ece5f2 0deg)`;
    if(shown>=target) clearInterval(timer);
  },55);
}

function saveLeaderboard(){
  const list=JSON.parse(localStorage.getItem("friendshipQuizScores")||"[]");
  list.push({name:player,score,date:new Date().toLocaleDateString()});
  list.sort((a,b)=>b.score-a.score);
  localStorage.setItem("friendshipQuizScores",JSON.stringify(list.slice(0,10)));
  return list.slice(0,10);
}

function confetti(){
  const pieces=["💜","✨","🎉","⭐"];
  for(let i=0;i<110;i++){
    const el=document.createElement("span");
    el.className="confetti";
    el.textContent=pieces[i%pieces.length];
    el.style.left=Math.random()*100+"vw";
    el.style.fontSize=(14+Math.random()*18)+"px";
    el.style.animationDelay=(Math.random()*.8)+"s";
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),4200);
  }
}

function showResults(){
  $("quiz").classList.add("hidden");
  $("result").classList.remove("hidden");
  animateScore();

  const e=ending(score);
  $("endingCard").className=`endingCard ${e.cls}`;
  $("endingCard").textContent=e.text;

  const lb=saveLeaderboard();
  $("leaderboard").innerHTML=lb.map((x,i)=>`
    <div class="item"><strong>${i+1}. ${x.name}</strong>
    <div class="small">${x.score}/20 • ${x.date}</div></div>`).join("");

  $("review").innerHTML=picked.map((x,i)=>`
    <div class="item"><strong>${i+1}. ${x.question}</strong>
    <div class="small">Your answer: ${x.chosen}</div>
    <div class="small">Correct answer: ${x.correct}</div></div>`).join("");

  if(score>=16) confetti();
}

$("shareBtn").onclick=async()=>{
  const text=`${player} scored ${score}/20 on the “How Well Do You Know Me?” quiz 💜`;
  try{
    if(navigator.share){
      await navigator.share({title:"How Well Do You Know Me?",text,url:location.href});
    } else {
      await navigator.clipboard.writeText(`${text} ${location.href}`);
      alert("Score and quiz link copied!");
    }
  }catch(e){}
};

$("restartBtn").onclick=()=>{
  index=0; score=0; picked=[];
  $("result").classList.add("hidden");
  $("start").classList.remove("hidden");
};
</script>
</body>
</html>
